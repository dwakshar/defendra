name: defendra
description: "Privacy-first on-device scam detection for India."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_local_notifications: ^21.0.0
  tflite_flutter: ^0.12.0
  fl_chart: ^0.69.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# ---------------------------------------------------------------------------
# App icon — shield mark on midnight background
# Place a 1024×1024 shield PNG at assets/images/icon.png before running:
#   flutter pub run flutter_launcher_icons
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icon_fg.png"
  web:
    generate: false
  windows:
    generate: false

# ---------------------------------------------------------------------------
# Native splash — full-black screen shown while Flutter initialises
# Place shield PNG at assets/images/splash.png before running:
#   flutter pub run flutter_native_splash:create
# ---------------------------------------------------------------------------
flutter_native_splash:
  color: "#000000"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#000000"
  ios: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/ml/model.tflite
    - assets/ml/vocab.json
    - assets/images/
